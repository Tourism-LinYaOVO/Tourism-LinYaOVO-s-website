<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="icon" href="/favicon.png" type="image/png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TouriCNの站点</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
/* ===== 基础 ===== */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Ma Shan Zheng', cursive;
  color:#fff;
  min-height:100vh;
  background: #1a1a2e;
  overflow-x:hidden;
}
/* ===== 背景 ===== */
.bg {
  position:fixed; inset:0;
  background:url('https://site-file.shenyouchu.cn/pc.jpg') center/cover no-repeat;
  filter:brightness(.5);
  z-index:-1;
}
/* ===== 主体 ===== */
.main {
  max-width:900px;
  margin:0 auto;
  padding:40px 20px;
}
/* ===== 头像 ===== */
.avatar-wrap { text-align:center; margin-bottom:20px; }
.avatar {
  width:120px; height:120px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,.3);
  animation:float 4s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-15px); }
}
/* ===== 头像下方文字 ===== */
.avatar-text { margin-top:15px; }
.avatar-text h1 { font-size:28px; margin-bottom:5px; }
.avatar-text p { font-size:14px; opacity:0.8; }

/* ===== Tab 栏 ===== */
.tab-bar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  margin: 30px 0;
}
.tab-item {
  padding: 10px 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
}
.tab-item:hover {
  background: rgba(255,255,255,0.15);
  color: #fff;
}
.tab-item.active {
  background: #FFB7C5;
  color: #1a1a2e;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(255,183,197,0.3);
}

/* ===== 内容区域 ===== */
.content-area {
  display: none;
  animation: fadeIn 0.5s ease;
}
.content-area.active {
  display: block;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ===== 混合容器 ===== */
.mixed-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ===== 链接卡片 ===== */
.links {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
  gap:15px;
}
.card {
  display:flex;
  align-items:center;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:15px;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}
.card:hover {
  transform:scale(1.05);
  background:rgba(255,255,255,.2);
}
.card img {
  width:48px; height:48px;
  border-radius:50%;
  margin-right:15px;
}
.card h3 { font-size:18px; margin-bottom:4px; }
.card p { font-size:14px; opacity:.8; }

/* ===== 文档样式 ===== */
.doc-content {
  padding: 25px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  line-height: 1.9;
  font-size: 15px;
}
.doc-content h1, .doc-content h2, .doc-content h3 {
  color: #FFB7C5;
  margin: 20px 0 10px;
}
.doc-content pre {
  background: rgba(0,0,0,0.5);
  padding: 15px;
  border-radius: 10px;
  overflow-x: auto;
  margin: 15px 0;
}
.doc-content code {
  font-family: 'Consolas', monospace;
  background: rgba(255,255,255,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  color: #FFB7C5;
}
.doc-content blockquote {
  border-left: 4px solid #FFB7C5;
  padding-left: 15px;
  margin: 15px 0;
  color: rgba(255,255,255,0.6);
}

/* ===== 底部信息 ===== */
.footer-info {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  text-align: center;
}
.runtime {
  font-size:14px;
}
.runtime span {
  color:#FFB7C5;
  font-weight:bold;
}
.footer {
  font-size:14px;
  opacity:.8;
  line-height:1.8;
  margin-top:15px;
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="main">
  <!-- 1. 头像 -->
  <div class="avatar-wrap">
    <img class="avatar" src="/favicon.png">
    <div class="avatar-text">
      <h1>TouriCNの站点</h1>
      <p>分享一些有趣的东西</p>
    </div>
  </div>

  <!-- 2. Tab 栏 -->
  <div class="tab-bar" id="tab-bar"></div>

  <!-- 3. 内容区域 -->
  <div id="content-container"></div>

  <!-- 4. 底部信息 -->
  <div class="footer-info">
    <div class="runtime" id="runtime"></div>
    <div class="footer">
      <p>Tips:该页面模仿了<a href="https://shenyouchu.cn" style="color:#FFB7C5;">沈幼楚的引导页</a>作为样式参考</p>
    </div>
  </div>
</div>

<script>
/* ===== 运行时长 ===== */
const START_TIME = new Date('2026-04-20T12:02:00Z').getTime();
function updateRuntime() {
  const diff = Date.now() - START_TIME;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('runtime').innerHTML =
    `本站已运行 <span>${d}</span> 天 <span>${h}</span> 时 <span>${m}</span> 分 <span>${s}</span> 秒`;
}
updateRuntime();
setInterval(updateRuntime, 1000);

/* ===== 加载数据并渲染 ===== */
fetch('./data.json')
  .then(res => res.json())
  .then(categories => {
    const tabBar = document.getElementById('tab-bar');
    const contentContainer = document.getElementById('content-container');

    categories.forEach((cat, index) => {
      // 1. 创建 Tab 按钮
      const tab = document.createElement('div');
      tab.className = 'tab-item';
      if (index === 0) tab.classList.add('active');
      tab.textContent = cat.category;
      tab.onclick = () => switchTab(index);
      tabBar.appendChild(tab);

      // 2. 创建内容区域
      const area = document.createElement('div');
      area.className = 'content-area';
      area.id = `content-${index}`;
      if (index === 0) area.classList.add('active');

      // 3. 创建混合容器
      const mixedContainer = document.createElement('div');
      mixedContainer.className = 'mixed-container';

      // 4. 情况 A：分类直接是文档（只有 file）
      if (cat.file) {
        const docDiv = document.createElement('div');
        docDiv.className = 'doc-content';
        docDiv.id = `doc-${index}`;
        docDiv.innerHTML = '<p>加载中...</p>';
        mixedContainer.appendChild(docDiv);
        loadDoc(`doc-${index}`, cat.file);
      }
      // 5. 情况 B：分类下有 items（混合链接和文档）
      else if (cat.items) {
        cat.items.forEach((item, itemIndex) => {
          // 链接卡片
          if (item.type === 'link') {
            const card = document.createElement('a');
            card.className = 'card';
            card.href = item.url;
            card.target = '_blank';
            card.innerHTML = `
              <img src="${item.icon}" alt="${item.title}">
              <div>
                <h3>${item.title}</h3>
                <p>${item.desc}</p>
              </div>
            `;
            mixedContainer.appendChild(card);
          }
          // 文档
          else if (item.type === 'markdown') {
            const docDiv = document.createElement('div');
            docDiv.className = 'doc-content';
            const docId = `doc-${index}-${itemIndex}`;
            docDiv.id = docId;
            docDiv.innerHTML = '<p>加载中...</p>';
            mixedContainer.appendChild(docDiv);
            
            // 立即加载文档
            loadDoc(docId, item.file);
          }
        });
      }

      area.appendChild(mixedContainer);
      contentContainer.appendChild(area);
    });
  })
  .catch(err => {
    console.error('加载数据失败:', err);
    document.getElementById('content-container').innerHTML = 
      '<p style="color:#ff6b6b;text-align:center;">加载数据失败，请检查 data.json 文件。</p>';
  });

/* ===== 切换 Tab ===== */
function switchTab(index) {
  document.querySelectorAll('.tab-item').forEach((tab, i) => {
    tab.classList.toggle('active', i === index);
  });
  document.querySelectorAll('.content-area').forEach((area, i) => {
    area.classList.toggle('active', i === index);
  });
}

/* ===== 加载文档 ===== */
function loadDoc(containerId, file) {
  const container = document.getElementById(containerId);
  if (!container) {
    console.error('容器未找到:', containerId);
    return;
  }
  
  fetch(file)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${file}`);
      return res.text();
    })
    .then(markdown => {
      container.innerHTML = marked.parse(markdown);
    })
    .catch(err => {
      container.innerHTML = `<p style="color:#ff6b6b;">加载失败：${err.message}</p>`;
      console.error('文档加载失败:', err);
    });
}
</script>
</body>
</html>
