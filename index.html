<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="icon" href="/favicon.png" type="image/png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TouriCNの站点</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
/* ===== 基础 ===== */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Ma Shan Zheng', cursive;
  color:#fff;
  min-height:100vh;
  background: #1a1a2e;
  overflow-x:hidden;
}
/* ===== 背景 ===== */
.bg {
  position:fixed; inset:0;
  background:url('https://site-file.shenyouchu.cn/pc.jpg') center/cover no-repeat;
  filter:brightness(.5);
  z-index:-1;
}
/* ===== 主体 ===== */
.main {
  max-width:900px;
  margin:0 auto;
  padding:40px 20px;
}
/* ===== 头像 ===== */
.avatar-wrap { text-align:center; margin-bottom:20px; }
.avatar {
  width:120px; height:120px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,.3);
  animation:float 4s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-15px); }
}
/* ===== 头像下方文字 ===== */
.avatar-text { margin-top:15px; }
.avatar-text h1 { font-size:28px; margin-bottom:5px; }
.avatar-text p { font-size:14px; opacity:0.8; }

/* ===== Tab 栏 ===== */
.tab-bar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  margin: 30px 0;
}
.tab-item {
  padding: 10px 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
}
.tab-item:hover {
  background: rgba(255,255,255,0.15);
  color: #fff;
}
.tab-item.active {
  background: #FFB7C5;
  color: #1a1a2e;
  font-weight: bold;
}

/* ===== 内容区域 ===== */
.content-area {
  display: none;
}
.content-area.active {
  display: block;
}

/* ===== 混合容器 ===== */
.mixed-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ===== 链接卡片 ===== */
.links {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
  gap:15px;
}
.card {
  display:flex;
  align-items:center;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:15px;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}
.card:hover {
  transform:scale(1.05);
  background:rgba(255,255,255,.2);
}
.card img {
  width:48px; height:48px;
  border-radius:50%;
  margin-right:15px;
}
.card h3 { font-size:18px; margin-bottom:4px; }
.card p { font-size:14px; opacity:.8; }

/* ===== 文档样式 ===== */
.doc-content {
  padding: 25px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  line-height: 1.9;
  font-size: 15px;
}
.doc-content h1, .doc-content h2, .doc-content h3 {
  color: #FFB7C5;
  margin: 20px 0 10px;
}
.doc-content pre {
  background: rgba(0,0,0,0.5);
  padding: 15px;
  border-radius: 10px;
  overflow-x: auto;
  margin: 15px 0;
}
.doc-content code {
  font-family: 'Consolas', monospace;
  background: rgba(255,255,255,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  color: #FFB7C5;
}
.doc-content blockquote {
  border-left: 4px solid #FFB7C5;
  padding-left: 15px;
  margin: 15px 0;
  color: rgba(255,255,255,0.6);
}

/* ===== 底部信息 ===== */
.footer-info {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  text-align: center;
}
.runtime {
  font-size:14px;
}
.runtime span {
  color:#FFB7C5;
  font-weight:bold;
}
.footer {
  font-size:14px;
  opacity:.8;
  line-height:1.8;
  margin-top:15px;
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="main">
  <!-- 1. 头像 -->
  <div class="avatar-wrap">
    <img class="avatar" src="/favicon.png">
    <div class="avatar-text">
      <h1>TouriCNの站点</h1>
      <p>分享一些有趣的东西</p>
    </div>
  </div>

  <!-- 2. Tab 栏 -->
  <div class="tab-bar" id="tab-bar"></div>

  <!-- 3. 内容区域 -->
  <div id="content-container"></div>

  <!-- 4. 底部信息 -->
  <div class="footer-info">
    <div class="runtime" id="runtime"></div>
    <div class="footer">
      <p>Tips:该页面模仿了<a href="https://shenyouchu.cn" style="color:#FFB7C5;">沈幼楚的引导页</a>作为样式参考</p>
    </div>
  </div>
</div>

<script src=/script/index.js></script>
</body>
</html>
