<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="icon" href="/favicon.png" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TourCN·Editor</title>

<style>
/* 基础布局 */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    padding-top: 0px; /* 为 Navbar 预留空间 */
    height: 100vh;
    height: 100dvh;
    height: -webkit-fill-available;
    overflow: hidden;
    background: #1e1e1e;
    color: #d4d4d4;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
    display: flex;
    height: calc(100vh - 60px);
    height: calc(100dvh - 60px);
    height: calc(-webkit-fill-available - 60px);
}

/* 侧边栏 */
.sidebar {
    width: 320px;
    min-width: 200px;
    background: #252526;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    z-index: 5;
}

.sidebar-header {
    padding: 12px 15px;
    font-weight: bold;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
}

.sidebar-header button {
    background: #0e639c;
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 18px;
}

.file-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    min-height: 0;
}

.file-item {
    display: flex;
    align-items: center;
    padding: 8px;
    border-radius: 4px;
    margin-bottom: 5px;
    background: #2d2d30;
    min-width: 0;
}

.file-item.active {
    background: #094771;
}

.file-name {
    flex: 1;
    cursor: pointer;
    padding: 2px 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
}

.file-actions {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
}

.file-actions button {
    background: #3a3a3a;
    border: none;
    color: #ccc;
    padding: 4px 6px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    white-space: nowrap;
}

.file-actions button:hover {
    background: #555;
}

.file-actions .save-btn { color: #4ec9b0; }
.file-actions .delete-btn { color: #f48771; }
.file-actions .rename-btn { color: #dcdcaa; }

.empty-tip {
    color: #888;
    padding: 20px;
    text-align: center;
    font-size: 13px;
}

.sidebar-footer {
    border-top: 1px solid #333;
    padding: 10px;
    display: flex;
    justify-content: center;
    flex-shrink: 0;
}

.settings-btn {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    font-size: 20px;
    width: 100%;
    text-align: center;
}

.settings-btn:hover {
    color: #fff;
}

/* 拖拽条 */
.resizer {
    width: 20px;
    background: #333;
    cursor: col-resize;
    user-select: none;
    touch-action: none;
    position: relative;
    flex-shrink: 0;
    z-index: 20;
}

.resizer::after {
    content: '';
    position: absolute;
    top: 0;
    left: -15px;
    right: -15px;
    bottom: 0;
}

.resizer:hover,
.resizer:active {
    background: #0e639c;
}

/* 主编辑区 */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    position: relative;
}

#editor-container {
    flex: 1;
    min-height: 0;
    font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'source-code-pro', monospace;
}

/* 遮罩层 */
#overlay {
    position: absolute;
    top: 0;
    left: 320px;
    right: 0;
    bottom: 0;
    background: rgba(30, 30, 30, 0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    color: #888;
    z-index: 10;
    transition: left 0.1s ease;
}

/* 模态框 */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    justify-content: center;
    align-items: center;
    z-index: 100;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
}

.modal-content {
    background: #252526;
    padding: 25px;
    border-radius: 8px;
    width: 350px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
}

.modal-content h3 {
    margin-top: 0;
    color: white;
    margin-bottom: 20px;
}

.settings-content {
    flex: 1;
    overflow-y: auto;
    max-height: calc(80vh - 120px);
    padding-right: 5px;
}

.settings-content::-webkit-scrollbar {
    width: 6px;
}

.settings-content::-webkit-scrollbar-track {
    background: #2d2d30;
}

.settings-content::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 3px;
}

.setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #333;
}

.setting-label {
    flex: 1;
    margin-right: 20px;
    font-size: 14px;
}

.setting-control {
    flex-shrink: 0;
    width: 120px;
    text-align: right;
}

.setting-control select,
.setting-control input[type="range"] {
    width: 100%;
    background: #3c3c3c;
    border: 1px solid #555;
    color: white;
    border-radius: 4px;
    padding: 5px;
}

.setting-control input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #0e639c;
}

.slider-value {
    display: inline-block;
    margin-left: 10px;
    min-width: 40px;
    text-align: center;
}

.modal-actions {
    text-align: right;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #333;
}

.modal-actions button {
    margin-left: 10px;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 4px;
    border: none;
}
</style>
</head>
<body>
<!-- 编辑器容器 -->
<div class="container" id="container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            Files
            <button onclick="showModal('createModal')">+</button>
        </div>
        <div class="file-list" id="fileList"></div>
        <div class="sidebar-footer">
            <button class="settings-btn" onclick="showModal('settingsModal')">⚙️</button>
        </div>
    </div>
    
    <div class="resizer" id="resizer"></div>
    
    <div class="main">
        <div id="editor-container"></div>
    </div>
    
    <div id="overlay">请选择或创建一个文件</div>
</div>

<!-- 模态框 -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <h3>新建文件</h3>
        <input id="fileNameInput" placeholder="例如: main.js" autofocus>
        <div class="modal-actions">
            <button onclick="closeModal('createModal')" style="background:#666;color:white">取消</button>
            <button onclick="createFile()" style="background:#0e639c;color:white">创建</button>
        </div>
    </div>
</div>

<div id="renameModal" class="modal">
    <div class="modal-content">
        <h3>重命名文件</h3>
        <input id="newFileNameInput" placeholder="新文件名" autofocus>
        <div class="modal-actions">
            <button onclick="closeModal('renameModal')" style="background:#666;color:white">取消</button>
            <button onclick="confirmRename()" style="background:#0e639c;color:white">确定</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>编辑器设置</h3>
        <div class="settings-content" id="settingsContent"></div>
        <div class="modal-actions">
            <button onclick="closeModal('settingsModal')" style="background:#666;color:white">关闭</button>
            <button onclick="applySettings()" style="background:#0e639c;color:white">应用</button>
        </div>
    </div>
</div>

<!-- Monaco Editor -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>


<!-- 编辑器脚本 -->
<script src=/script/tools-editor.js>
</body>
</html>
